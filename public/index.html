    <script type="text/javascript">
      // Application mono-page pour GitHub Pages
      // Licence MIT
      // https://github.com/rafgraph/spa-github-pages
      // Ce script vérifie si une redirection est présente dans la chaîne de requête,
      // la convertit en URL correcte et l'ajoute à l'historique du navigateur
      // via window.history.replaceState(...),
      // ce qui empêche le navigateur de tenter de charger la nouvelle URL.
      // Lorsque l'application mono-page est chargée plus bas dans ce fichier,
      // l'URL correcte sera dans l'historique du navigateur pour
      // que l'application puisse router correctement.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
